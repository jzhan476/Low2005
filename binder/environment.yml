# =============================================================================
# REMARK/Binder-compatible conda environment for Low2005
# =============================================================================
#
# This file is intentionally MINIMAL. It bootstraps `uv`, which then resolves
# all Python dependencies from the pinned `uv.lock` at the repository root
# (via `pyproject.toml`). This pattern is explicitly endorsed by the REMARK
# STANDARD.md ("a minimal conda environment that installs your chosen
# environment manager (for example, uv) ... from a separate, pinned lockfile
# (for example, uv.lock)").
#
# The actual Python dependency materialization happens in:
#   - `binder/postBuild` (when launched via mybinder.org / repo2docker)
#   - `reproduce.sh` / `reproduce/reproduce_environment_comp_uv.sh`
#     (when invoked from the command line by REMARK reviewers)
#
# Create environment:
#   conda env create -f binder/environment.yml
# Activate:
#   conda activate low2005
# Materialize pinned Python deps from uv.lock:
#   uv sync --frozen
# =============================================================================

name: low2005
channels:
  - conda-forge

dependencies:
  - python=3.11
  - uv>=0.5
  - pip
